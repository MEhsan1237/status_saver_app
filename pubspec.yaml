name: status_app
description: "A Production-Level WhatsApp Status Saver App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  video_player: ^2.8.6
  chewie: ^1.8.5
  photo_view: ^0.15.0
  open_filex: ^4.5.0
  path: ^1.9.0
  intl: ^0.19.0
  flutter_staggered_animations: ^1.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  device_info_plus: ^10.1.0
  video_thumbnail: ^0.5.3
  shared_storage: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
